name: Android CI

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Fix Gradle Repository Mode Conflict
      run: |
        if [ -f settings.gradle ]; then
          sed -i 's/RepositoriesMode.PREFER_SETTINGS/RepositoriesMode.PREFER_PROJECT/g' settings.gradle
        fi

    - name: Build with Gradle Cloud Tool
      uses: gradle/actions/setup-gradle@v3
      with:
        arguments: assembleDebug
        gradle-version: 8.4
        
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: camera-bridge-debug-apk
        path: app/build/outputs/apk/debug/*.apk
